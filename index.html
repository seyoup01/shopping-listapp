<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>쇼핑 리스트</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .app {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    width: 100%;
    max-width: 480px;
    padding: 32px;
  }
  h1 {
    font-size: 28px;
    color: #333;
    margin-bottom: 8px;
    text-align: center;
  }
  .subtitle {
    text-align: center;
    color: #888;
    font-size: 14px;
    margin-bottom: 24px;
  }
  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  #item-input {
    flex: 1;
    padding: 12px 16px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  #item-input:focus { border-color: #667eea; }
  #add-btn {
    padding: 12px 20px;
    background: #667eea;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  #add-btn:hover { background: #5568d3; }
  #add-btn:active { transform: scale(0.97); }

  .stats {
    display: flex;
    justify-content: space-between;
    color: #888;
    font-size: 13px;
    margin-bottom: 12px;
    padding: 0 4px;
  }
  .clear-btn {
    background: none;
    border: none;
    color: #e57373;
    cursor: pointer;
    font-size: 13px;
  }
  .clear-btn:hover { text-decoration: underline; }

  ul#list { list-style: none; }
  ul#list li {
    display: flex;
    align-items: center;
    padding: 12px;
    border: 1px solid #f0f0f0;
    border-radius: 8px;
    margin-bottom: 8px;
    background: #fafafa;
    transition: background 0.15s;
  }
  ul#list li:hover { background: #f5f5f5; }
  ul#list li.checked .item-text {
    text-decoration: line-through;
    color: #aaa;
  }
  .item-checkbox {
    width: 20px;
    height: 20px;
    margin-right: 12px;
    cursor: pointer;
    accent-color: #667eea;
  }
  .item-text {
    flex: 1;
    color: #333;
    font-size: 15px;
    word-break: break-word;
  }
  .delete-btn {
    background: none;
    border: none;
    color: #e57373;
    font-size: 18px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    transition: background 0.15s;
  }
  .delete-btn:hover { background: #ffebee; }

  .empty {
    text-align: center;
    color: #bbb;
    padding: 32px 0;
    font-size: 14px;
  }
</style>
</head>
<body>
  <div class="app">
    <h1>🛒 쇼핑 리스트</h1>
    <p class="subtitle">필요한 물건을 추가하세요</p>

    <div class="input-row">
      <input id="item-input" type="text" placeholder="예: 우유, 빵, 사과..." maxlength="100" />
      <button id="add-btn">추가</button>
    </div>

    <div class="stats">
      <span id="count">0개 항목</span>
      <button class="clear-btn" id="clear-btn">전체 삭제</button>
    </div>

    <ul id="list"></ul>
  </div>

<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

  const SUPABASE_URL = "https://xrvluojtyiqxvbcgxnsj.supabase.co";
  const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_G5T1SOYXCftB5_pZZQu-9A_pHR5MN2G";
  const TABLE = "shopping_items";

  const supabase = createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

  const input = document.getElementById("item-input");
  const addBtn = document.getElementById("add-btn");
  const list = document.getElementById("list");
  const countEl = document.getElementById("count");
  const clearBtn = document.getElementById("clear-btn");

  let items = [];

  async function loadItems() {
    const { data, error } = await supabase
      .from(TABLE)
      .select("id, text, checked, created_at")
      .order("created_at", { ascending: true });
    if (error) {
      console.error("Failed to load items:", error);
      countEl.textContent = "불러오기 실패";
      return;
    }
    items = data ?? [];
    render();
  }

  function render() {
    list.innerHTML = "";
    if (items.length === 0) {
      const empty = document.createElement("li");
      empty.className = "empty";
      empty.textContent = "아직 추가된 항목이 없습니다";
      empty.style.border = "none";
      empty.style.background = "transparent";
      list.appendChild(empty);
    } else {
      items.forEach((item) => {
        const li = document.createElement("li");
        if (item.checked) li.classList.add("checked");

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.className = "item-checkbox";
        checkbox.checked = item.checked;
        checkbox.addEventListener("change", () => toggleItem(item.id));

        const text = document.createElement("span");
        text.className = "item-text";
        text.textContent = item.text;

        const del = document.createElement("button");
        del.className = "delete-btn";
        del.textContent = "✕";
        del.title = "삭제";
        del.addEventListener("click", () => deleteItem(item.id));

        li.append(checkbox, text, del);
        list.appendChild(li);
      });
    }
    const checkedCount = items.filter((i) => i.checked).length;
    countEl.textContent = `${items.length}개 항목 (완료 ${checkedCount})`;
  }

  async function addItem() {
    const text = input.value.trim();
    if (!text) return;
    addBtn.disabled = true;
    const { data, error } = await supabase
      .from(TABLE)
      .insert({ text, checked: false })
      .select()
      .single();
    addBtn.disabled = false;
    if (error) {
      console.error("Failed to add item:", error);
      alert("항목 추가에 실패했습니다.");
      return;
    }
    items.push(data);
    input.value = "";
    render();
    input.focus();
  }

  async function toggleItem(id) {
    const item = items.find((i) => i.id === id);
    if (!item) return;
    const next = !item.checked;
    item.checked = next;
    render();
    const { error } = await supabase
      .from(TABLE)
      .update({ checked: next })
      .eq("id", id);
    if (error) {
      console.error("Failed to toggle item:", error);
      item.checked = !next;
      render();
    }
  }

  async function deleteItem(id) {
    const prev = items;
    items = items.filter((i) => i.id !== id);
    render();
    const { error } = await supabase.from(TABLE).delete().eq("id", id);
    if (error) {
      console.error("Failed to delete item:", error);
      items = prev;
      render();
    }
  }

  async function clearAll() {
    if (items.length === 0) return;
    if (!confirm("모든 항목을 삭제하시겠습니까?")) return;
    const ids = items.map((i) => i.id);
    const prev = items;
    items = [];
    render();
    const { error } = await supabase.from(TABLE).delete().in("id", ids);
    if (error) {
      console.error("Failed to clear items:", error);
      items = prev;
      render();
    }
  }

  addBtn.addEventListener("click", addItem);
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") addItem();
  });
  clearBtn.addEventListener("click", clearAll);

  loadItems();
  input.focus();
</script>
</body>
</html>
